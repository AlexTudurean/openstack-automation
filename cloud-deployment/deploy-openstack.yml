- name: Prepare all OpenStack nodes
  hosts: openstack_nodes
  gather_facts: true
  become: true
  roles:
    - role: prep-openstack-nodes

- name: Prepare storage node
  hosts: storage_nodes
  gather_facts: true
  become: true
  roles:
    - role: prep-storage-node

- name: Prepare management node
  hosts: management_nodes
  gather_facts: true
  become: true
  roles:
    - role: prep-management-node
