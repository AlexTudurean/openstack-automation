ansible_host: 192.168.0.104

portal_app_dir: "/opt/portal"

ethernets:
  - link: 'eth0'
    addresses: ['192.168.0.104/24']
    routes:
      - to: '0.0.0.0/0'
        via: '192.168.0.1'
      - to: '10.0.2.0/24'    # OpenStack floating IPs — forwarded via Proxmox vmbr0→vmbr1
        via: '192.168.0.100'
      - to: '10.0.4.0/24'    # mgmt-net — forwarded via Proxmox to OVN mgmt-router
        via: '192.168.0.100'
    nameservers:
      addresses: ['8.8.8.8', '8.8.4.4']

vlans:
  - vlan_id: 4000    # OpenStack management VLAN — required to reach kolla VIP 10.0.1.254
    link: 'eth0'
    addresses: ['10.0.1.200/24']
    mtu: 1400
