ansible_host: 192.168.0.103
mgmt_vlan_ip: "10.0.1.4"

ethernets:
  - link: 'eth0'
    addresses: ['192.168.0.103/24']
    routes:
      - to: '0.0.0.0/0'
        via: '192.168.0.1'
    nameservers:
      addresses: ['8.8.8.8', '8.8.4.4']

vlans:
  - vlan_id: 4000 # management
    link: 'eth0'
    addresses: ['10.0.1.4/24']
    mtu: 1400
    routes:
      - to: '10.0.0.0/16'
        via: '10.0.1.1'
  - vlan_id: 4001 # services
    link: 'eth0'
    mtu: 1400
    addresses: ['10.0.2.4/24']
  - vlan_id: 4002 # storage
    link: 'eth0'
    mtu: 1400
    addresses: ['10.0.3.4/24']
