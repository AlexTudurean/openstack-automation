- name: Ping node
  ansible.builtin.ping:

- name: List files in netplan directory
  ansible.builtin.command: ls -l /etc/netplan/
  register: ls_output
  changed_when: false
  when: debug_mode | default(false)

- name: Show ls output
  ansible.builtin.debug:
    var: ls_output.stdout
  when: debug_mode | default(false)
