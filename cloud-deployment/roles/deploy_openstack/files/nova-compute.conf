[DEFAULT]
# Nova reports the full Ceph pool size as available disk on every compute node
# because all nodes share the same RBD pool. This causes Placement to think
# N * pool_size disk is available when only pool_size actually exists.
#
# disk_allocation_ratio scales each node's reported DISK_GB in Placement so
# the aggregate across all compute nodes equals the real pool capacity:
#   effective_per_node = pool_size * disk_allocation_ratio
#   total = N_nodes * pool_size * disk_allocation_ratio = pool_size (when ratio = 1/N)
#
# Current setup: 3 compute nodes (controller, compute, storage), 180 GB Ceph pool.
# Update this value when adding or removing compute nodes: ratio = 1 / N_nodes.
disk_allocation_ratio = 0.33

# Resume instances to their pre-shutdown power state when a compute node boots.
# Without this, every tenant VM (incl. the vpn-gateway the portal depends on)
# stays SHUTOFF after a host reboot/power loss and must be started by hand.
resume_guests_state_on_host_boot = True
