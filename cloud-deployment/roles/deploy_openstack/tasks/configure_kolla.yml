---
# lookup() always reads from the Ansible control node (Mac), regardless of play target
- name: Extract ceph cluster info
  ansible.builtin.set_fact:
    ceph_fsid: "{{ lookup('file', ceph_fsid_tmp_file) | regex_replace('\n', '') }}"
    ceph_mon_dump: "{{ lookup('file', ceph_mon_dump_file) | from_json }}"

- name: Derive ceph mon members and hosts from mon dump
  ansible.builtin.set_fact:
    mon_initial_members: "{{ ceph_mon_dump.mons | map(attribute='name') | list }}"
    mon_hosts: "{{ ceph_mon_dump.mons | map(attribute='addr') | map('regex_replace', '/[0-9]+$', '') | list }}"

# Render ceph.conf locally so the subsequent copy task can push it to the controller
- name: Create ceph.conf on control node
  ansible.builtin.template:
    src: ceph.conf.j2
    dest: "{{ ceph_keyrings_local_dir }}/ceph.conf"
    mode: '0644'
  delegate_to: localhost
  become: false

- name: Configure Kolla
  vars:
    ansible_python_interpreter: "{{ venv_wrapper }}"
  block:
    - name: Generate Kolla passwords
      ansible.builtin.command: "{{ kolla_venv_path }}/bin/kolla-genpwd"
      environment:
        PATH: "{{ kolla_venv_path }}/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      changed_when: false
      tags: [config_globals]

    - name: Copy globals.yml to /etc/kolla
      ansible.builtin.copy:
        src: globals.yml
        dest: /etc/kolla/globals.yml
        mode: '0644'
      tags: [config_globals]

    - name: Create /etc/kolla/config directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop: "{{ config_dirs }}"

    - name: Copy keyring files to /etc/kolla/config
      ansible.builtin.copy:
        src: "{{ ceph_keyrings_local_dir }}/ceph.client.{{ item.split('/')[-1].split('.')[2] }}.keyring"
        dest: "{{ item }}"
        mode: '0600'
      loop: "{{ ceph_keyring_files }}"

    - name: Copy ceph.conf to /etc/kolla/config
      ansible.builtin.copy:
        src: "{{ ceph_keyrings_local_dir }}/ceph.conf"
        dest: "{{ item }}"
        mode: '0644'
      loop: "{{ ceph_conf_files }}"

    - name: Copy nova-compute config override
      ansible.builtin.copy:
        src: nova-compute.conf
        dest: /etc/kolla/config/nova/nova-compute.conf
        mode: '0644'
