---
# Creates the mgmt-net Neutron network (second NIC for admin SSH to dev VMs)
# and the pool-sg security group used for available VMs in the portal pool.
# Run once after kolla_init; safe to re-run (all tasks check before acting).

- name: Check if mgmt-net network exists
  ansible.builtin.shell: >
    source /etc/kolla/admin-openrc.sh &&
    {{ kolla_venv_path }}/bin/openstack network show mgmt-net -f value -c id
  args:
    executable: /bin/bash
  environment:
    PATH: "{{ kolla_venv_path }}/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  register: mgmt_net_check
  failed_when: false
  changed_when: false

- name: Create mgmt-net network
  ansible.builtin.shell: >
    source /etc/kolla/admin-openrc.sh &&
    {{ kolla_venv_path }}/bin/openstack network create mgmt-net
    --description "Admin management network for dev VMs"
  args:
    executable: /bin/bash
  environment:
    PATH: "{{ kolla_venv_path }}/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  when: mgmt_net_check.rc != 0
  changed_when: true

- name: Check if mgmt-subnet exists
  ansible.builtin.shell: >
    source /etc/kolla/admin-openrc.sh &&
    {{ kolla_venv_path }}/bin/openstack subnet show mgmt-subnet -f value -c id
  args:
    executable: /bin/bash
  environment:
    PATH: "{{ kolla_venv_path }}/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  register: mgmt_subnet_check
  failed_when: false
  changed_when: false

- name: Create mgmt-subnet
  ansible.builtin.shell: >
    source /etc/kolla/admin-openrc.sh &&
    {{ kolla_venv_path }}/bin/openstack subnet create mgmt-subnet
    --network mgmt-net
    --subnet-range {{ mgmt_net_cidr }}
    --gateway {{ mgmt_net_gateway }}
    --host-route destination={{ admin_vpn_cidr | default('10.99.0.0/24') }},gateway={{ mgmt_net_gateway }}
    --dns-nameserver 8.8.8.8
  args:
    executable: /bin/bash
  environment:
    PATH: "{{ kolla_venv_path }}/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  when: mgmt_subnet_check.rc != 0
  changed_when: true

- name: Check if mgmt-subnet already advertises admin VPN return route
  ansible.builtin.shell: |
    source /etc/kolla/admin-openrc.sh
    ROUTES="$({{ kolla_venv_path }}/bin/openstack subnet show mgmt-subnet -f json -c host_routes)"
    echo "$ROUTES" | grep -q '"destination": "{{ admin_vpn_cidr | default('10.99.0.0/24') }}"'
    echo "$ROUTES" | grep -q '"nexthop": "{{ mgmt_net_gateway }}"'
  args:
    executable: /bin/bash
  environment:
    PATH: "{{ kolla_venv_path }}/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  register: mgmt_subnet_admin_route_check
  failed_when: false
  changed_when: false

- name: Ensure mgmt-subnet advertises admin VPN return route
  ansible.builtin.shell: >
    source /etc/kolla/admin-openrc.sh &&
    {{ kolla_venv_path }}/bin/openstack subnet set mgmt-subnet
    --host-route destination={{ admin_vpn_cidr | default('10.99.0.0/24') }},gateway={{ mgmt_net_gateway }}
  args:
    executable: /bin/bash
  environment:
    PATH: "{{ kolla_venv_path }}/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  when: mgmt_subnet_admin_route_check.rc != 0
  changed_when: true

- name: Check if mgmt-router exists
  ansible.builtin.shell: >
    source /etc/kolla/admin-openrc.sh &&
    {{ kolla_venv_path }}/bin/openstack router show mgmt-router -f value -c id
  args:
    executable: /bin/bash
  environment:
    PATH: "{{ kolla_venv_path }}/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  register: mgmt_router_check
  failed_when: false
  changed_when: false

- name: Create mgmt-router with fixed external gateway IP
  ansible.builtin.shell: >
    source /etc/kolla/admin-openrc.sh &&
    {{ kolla_venv_path }}/bin/openstack router create mgmt-router &&
    {{ kolla_venv_path }}/bin/openstack router set mgmt-router
    --external-gateway public1
    --fixed-ip ip-address={{ mgmt_router_external_ip }} &&
    {{ kolla_venv_path }}/bin/openstack router add subnet mgmt-router mgmt-subnet
  args:
    executable: /bin/bash
  environment:
    PATH: "{{ kolla_venv_path }}/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  when: mgmt_router_check.rc != 0
  changed_when: true

- name: Check if pool-sg security group exists
  ansible.builtin.shell: >
    source /etc/kolla/admin-openrc.sh &&
    {{ kolla_venv_path }}/bin/openstack security group show pool-sg -f value -c id
  args:
    executable: /bin/bash
  environment:
    PATH: "{{ kolla_venv_path }}/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  register: pool_sg_check
  failed_when: false
  changed_when: false

- name: Create pool-sg security group
  ansible.builtin.shell: >
    source /etc/kolla/admin-openrc.sh &&
    {{ kolla_venv_path }}/bin/openstack security group create pool-sg
    --description "Available dev VMs: SSH accessible from admin VPN"
  args:
    executable: /bin/bash
  environment:
    PATH: "{{ kolla_venv_path }}/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  when: pool_sg_check.rc != 0
  changed_when: true

- name: Add admin VPN SSH rule to pool-sg (sysadmin out-of-band access over mgmt-net)
  ansible.builtin.shell: >
    source /etc/kolla/admin-openrc.sh &&
    {{ kolla_venv_path }}/bin/openstack security group rule create pool-sg
    --protocol tcp --dst-port 22 --remote-ip {{ admin_vpn_cidr | default('10.99.0.0/24') }}
  args:
    executable: /bin/bash
  environment:
    PATH: "{{ kolla_venv_path }}/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  changed_when: pool_sg_admin_rule.rc == 0
  failed_when: false
  register: pool_sg_admin_rule

- name: Discover vpn-gateway demo-net IP
  ansible.builtin.shell: >
    source /etc/kolla/admin-openrc.sh &&
    {{ kolla_venv_path }}/bin/openstack server show vpn-gateway -f value -c addresses |
    sed -n 's/.*demo-net=\([0-9.]\+\).*/\1/p'
  args:
    executable: /bin/bash
  environment:
    PATH: "{{ kolla_venv_path }}/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  register: vpn_gateway_demo_ip_live
  changed_when: false
  failed_when: false

- name: Route user VPN tunnel subnet back through vpn-gateway
  ansible.builtin.shell: >
    source /etc/kolla/admin-openrc.sh &&
    {{ kolla_venv_path }}/bin/openstack router set demo-router
    --route destination={{ vpn_gateway_tunnel_subnet }},gateway={{ vpn_gateway_demo_ip_live.stdout | trim | default(vpn_gateway_demo_ip, true) }}
  args:
    executable: /bin/bash
  environment:
    PATH: "{{ kolla_venv_path }}/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  changed_when: true
  failed_when: false

- name: Check if demo-subnet already advertises user VPN return route
  ansible.builtin.shell: |
    source /etc/kolla/admin-openrc.sh
    ROUTES="$({{ kolla_venv_path }}/bin/openstack subnet show demo-subnet -f json -c host_routes)"
    echo "$ROUTES" | grep -q '"destination": "{{ vpn_gateway_tunnel_subnet }}"'
    echo "$ROUTES" | grep -q '"nexthop": "{{ demo_net_gateway }}"'
  args:
    executable: /bin/bash
  environment:
    PATH: "{{ kolla_venv_path }}/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  register: demo_subnet_user_route_check
  failed_when: false
  changed_when: false

- name: Ensure demo-subnet advertises user VPN return route
  ansible.builtin.shell: >
    source /etc/kolla/admin-openrc.sh &&
    {{ kolla_venv_path }}/bin/openstack subnet set demo-subnet
    --host-route destination={{ vpn_gateway_tunnel_subnet }},gateway={{ demo_net_gateway }}
  args:
    executable: /bin/bash
  environment:
    PATH: "{{ kolla_venv_path }}/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  when: demo_subnet_user_route_check.rc != 0
  changed_when: true

- name: Print mgmt-net post-deploy info
  ansible.builtin.debug:
    msg:
      - "mgmt-net CIDR            : {{ mgmt_net_cidr }}"
      - "mgmt-router external IP  : {{ mgmt_router_external_ip }}"
      - "Proxmox static route     : ip route add {{ mgmt_net_cidr }} via {{ mgmt_router_external_ip }}"
      - "Admin WireGuard          : add {{ mgmt_net_cidr }} to AllowedIPs"
      - "User VPN return route    : {{ vpn_gateway_tunnel_subnet }} via {{ vpn_gateway_demo_ip_live.stdout | trim | default(vpn_gateway_demo_ip, true) }} on demo-router"
      - "demo-subnet host route   : {{ vpn_gateway_tunnel_subnet }} via {{ demo_net_gateway }}"
