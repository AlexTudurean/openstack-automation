- name: Add Rook Helm repository
  kubernetes.core.helm_repository:
    name: "{{ rook_repo }}"
    url: https://charts.rook.io/release
    kubeconfig: "{{ k8s_kubeconfig }}"

- name: Install Rook operator
  kubernetes.core.helm:
    name: "{{ rook_operator_chart }}"
    chart_ref: "{{ rook_repo }}/{{ rook_operator_chart }}"
    chart_version: "{{ rook_chart_version }}"
    release_namespace: "{{ rook_ceph_namespace }}"
    create_namespace: true
    state: present
    wait: true
    wait_timeout: 300s
    update_repo_cache: true
    kubeconfig: "{{ k8s_kubeconfig }}"

- name: Copy Rook cluster overrides file
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/roles/prep-storage-node/files/rook-cluster-overrides.yaml"
    dest: /tmp/rook-cluster-overrides.yaml

# Install without --wait so Helm doesn't timeout on image pull + OSD init.
# Ceph image pull + OSD provisioning can take 15-20 min on first install.
# We wait for readiness separately below with a longer timeout.
- name: Install Rook cluster
  kubernetes.core.helm:
    name: "{{ rook_cluster_chart }}"
    chart_ref: "{{ rook_repo }}/{{ rook_cluster_chart }}"
    chart_version: "{{ rook_chart_version }}"
    release_namespace: "{{ rook_ceph_namespace }}"
    create_namespace: true
    values_files:
      - /tmp/rook-cluster-overrides.yaml
    state: present
    wait: false
    update_repo_cache: true
    kubeconfig: "{{ k8s_kubeconfig }}"

- name: Wait for CephCluster to be ready (image pull + OSD init can take 20+ min)
  kubernetes.core.k8s_info:
    api_version: ceph.rook.io/v1
    kind: CephCluster
    namespace: "{{ rook_ceph_namespace }}"
    name: rook-ceph
    wait: true
    wait_timeout: 1800
    wait_condition:
      type: Ready
    kubeconfig: "{{ k8s_kubeconfig }}"
