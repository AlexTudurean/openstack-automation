# Install Python dependencies for Kubernetes modules using virtual environment
- name: Install python3-venv if not present
  package:
    name: 
      - python3-pip
      - python3-venv
    state: present
  become: true

- name: Create virtual environment for Kubernetes tools
  command: python3 -m venv /opt/k8s-venv
  args:
    creates: /opt/k8s-venv/bin/python
  become: true

- name: Install required Python packages for Kubernetes modules in venv
  pip:
    name:
      - kubernetes>=24.0.0
      - PyYAML>=5.4.0
      - jsonpatch>=1.32
    state: present
    virtualenv: /opt/k8s-venv
  become: true

- name: Set ansible_python_interpreter to use the virtual environment
  set_fact:
    ansible_python_interpreter: /opt/k8s-venv/bin/python

- name: Verify kubernetes library installation
  command: /opt/k8s-venv/bin/python -c "import kubernetes; print('Kubernetes library installed successfully')"
  register: k8s_lib_check
  changed_when: false

- name: Display verification result
  debug:
    var: k8s_lib_check.stdout
