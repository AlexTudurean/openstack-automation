# Install Python dependencies for Kubernetes modules
- name: Install pip3 if not present
  package:
    name: python3-pip
    state: present
  become: true

- name: Install required Python packages for Kubernetes modules
  pip:
    name:
      - kubernetes>=24.0.0
      - PyYAML>=5.4.0
      - jsonpatch>=1.32
    state: present
    executable: pip3
    extra_args: --break-system-packages
  become: true

- name: Verify kubernetes library installation
  command: python3 -c "import kubernetes; print('Kubernetes library installed successfully')"
  register: k8s_lib_check
  changed_when: false

- name: Display verification result
  debug:
    var: k8s_lib_check.stdout
